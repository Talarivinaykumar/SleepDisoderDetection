<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" fill="none">
  <!-- Doctor Body -->
  <ellipse cx="250" cy="520" rx="80" ry="20" fill="rgba(0, 212, 255, 0.1)"/>
  
  <!-- Lab Coat -->
  <path d="M200 280 L200 520 L300 520 L300 280 Z" fill="#E8F4F8"/>
  <path d="M200 280 L220 300 L220 520 L200 520 Z" fill="#D0E8F0"/>
  <path d="M280 280 L280 520 L300 520 L300 300 Z" fill="#D0E8F0"/>
  
  <!-- Shirt -->
  <rect x="220" y="280" width="60" height="80" fill="#00D4FF" opacity="0.3"/>
  
  <!-- Stethoscope -->
  <circle cx="270" cy="320" r="12" fill="none" stroke="#00D4FF" stroke-width="3"/>
  <path d="M270 308 Q280 250 250 220" fill="none" stroke="#00D4FF" stroke-width="3"/>
  <circle cx="250" cy="220" r="8" fill="#00D4FF"/>
  
  <!-- Arms -->
  <rect x="180" y="300" width="20" height="120" rx="10" fill="#FFD4A3"/>
  <rect x="300" y="300" width="20" height="120" rx="10" fill="#FFD4A3"/>
  
  <!-- Tablet in hand -->
  <rect x="310" y="350" width="60" height="80" rx="5" fill="#1E293B" stroke="#00D4FF" stroke-width="2"/>
  <rect x="315" y="355" width="50" height="60" fill="#00D4FF" opacity="0.2"/>
  <line x1="320" y1="365" x2="360" y2="365" stroke="#00D4FF" stroke-width="2"/>
  <line x1="320" y1="375" x2="355" y2="375" stroke="#00D4FF" stroke-width="2"/>
  <line x1="320" y1="385" x2="350" y2="385" stroke="#00D4FF" stroke-width="2"/>
  
  <!-- Head -->
  <circle cx="250" cy="200" r="60" fill="#FFD4A3"/>
  
  <!-- Hair -->
  <path d="M190 200 Q190 140 250 140 Q310 140 310 200 L310 180 Q310 150 250 150 Q190 150 190 180 Z" fill="#2C3E50"/>
  
  <!-- Eyes -->
  <circle cx="230" cy="200" r="5" fill="#2C3E50"/>
  <circle cx="270" cy="200" r="5" fill="#2C3E50"/>
  
  <!-- Smile -->
  <path d="M230 220 Q250 230 270 220" fill="none" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Medical Cross on Coat -->
  <rect x="240" y="380" width="20" height="60" fill="#00D4FF" opacity="0.5"/>
  <rect x="230" y="400" width="40" height="20" fill="#00D4FF" opacity="0.5"/>
  
  <!-- Floating Medical Icons -->
  <!-- Heart Icon -->
  <g transform="translate(100, 150)">
    <path d="M20 10 C20 5 15 2 12 2 C10 2 8 3 7 5 C6 3 4 2 2 2 C-1 2 -6 5 -6 10 C-6 15 0 20 7 27 C14 20 20 15 20 10 Z" fill="#EF4444" opacity="0.6"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Plus Icon -->
  <g transform="translate(380, 200)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#00D4FF" stroke-width="3" opacity="0.6"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#00D4FF" stroke-width="3"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#00D4FF" stroke-width="3"/>
    <animateTransform attributeName="transform" type="rotate" from="0 380 200" to="360 380 200" dur="10s" repeatCount="indefinite"/>
  </g>
  
  <!-- DNA Helix -->
  <g transform="translate(120, 400)">
    <path d="M0 0 Q10 10 0 20 Q-10 30 0 40" fill="none" stroke="#00FFAA" stroke-width="2" opacity="0.6"/>
    <path d="M0 0 Q-10 10 0 20 Q10 30 0 40" fill="none" stroke="#00FFAA" stroke-width="2" opacity="0.6"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </g>
  
  <!-- Brain Icon -->
  <g transform="translate(360, 450)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#00D4FF" stroke-width="2" opacity="0.6"/>
    <path d="M-8 -5 Q-5 -8 0 -5 Q5 -8 8 -5" fill="none" stroke="#00D4FF" stroke-width="2"/>
    <path d="M-8 0 Q-5 -3 0 0 Q5 -3 8 0" fill="none" stroke="#00D4FF" stroke-width="2"/>
    <path d="M-8 5 Q-5 2 0 5 Q5 2 8 5" fill="none" stroke="#00D4FF" stroke-width="2"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </g>
  
  <!-- Data Points -->
  <circle cx="150" cy="250" r="4" fill="#00D4FF" opacity="0.8">
    <animate attributeName="cy" values="250;240;250" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="300" r="4" fill="#00FFAA" opacity="0.8">
    <animate attributeName="cy" values="300;290;300" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="320" r="4" fill="#0099FF" opacity="0.8">
    <animate attributeName="cy" values="320;310;320" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Heartbeat Line -->
  <g transform="translate(50, 100)">
    <path d="M0 0 L20 0 L25 -15 L30 15 L35 0 L60 0" fill="none" stroke="#00D4FF" stroke-width="2" opacity="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
